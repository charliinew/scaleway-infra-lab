#   namespace: onboarding
# spec:
#   targetRef:
#     apiVersion: apps/v1
#     kind: Deployment
#     name: rest-api
#   updatePolicy:
#     updateMode: Auto
#   resourcePolicy:
#     containerPolicies:
#       - containerName: rest-api
#         minAllowed:
#           cpu: 100m
#           memory: 256Mi
#         maxAllowed:
#           cpu: 1000m
#           memory: 1Gi
