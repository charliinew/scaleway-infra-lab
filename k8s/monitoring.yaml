# ── Pod Disruption Budget for High Availability ────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rest-api-pdb
  namespace: onboarding
  labels:
    app.kubernetes.io/name: rest-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rest-api
      tier: backend

---
