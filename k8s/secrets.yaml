# External Secret for Scaleway Secret Manager Integration
#
# PREREQUISITE: External Secrets Operator must be installed on the cluster.
# Install: kubectl apply -f https://github.com/external-secrets/external-secrets/releases/latest/download/install.yaml
#
# This ExternalSecret pulls secrets from Scaleway Secret Manager and creates the
# 'onboarding-secrets' k8s Secret consumed by rest-api pods.
#
# IMPORTANT: S3_ACCESS_KEY and S3_SECRET_KEY are NOT stored in Secret Manager
# (they are needed to authenticate TO Secret Manager — circular dependency).
# These two are created separately via: make _create-s3-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scaleway-secrets
  namespace: onboarding
  labels:
    app.kubernetes.io/name: onboarding
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway-secret-store
  target:
    name: onboarding-secrets
    creationPolicy: Merge
  data:
    # Database URL from Secret Manager
    - secretKey: DATABASE_URL
      remoteRef:
        key: onboarding-database-url
        property: url

    # S3 Bucket Name from Secret Manager
    - secretKey: S3_BUCKET_NAME
      remoteRef:
        key: onboarding-bucket-name
        property: bucket_name

    # Qwen API Key from Secret Manager
    - secretKey: QWEN_API_KEY
      remoteRef:
        key: onboarding-qwen-api-key
        property: QWEN_API_KEY

    # Image Processor Token
    - secretKey: IMAGE_PROCESSOR_TOKEN
      remoteRef:
        key: onboarding-image-processor-token
        property: TOKEN
