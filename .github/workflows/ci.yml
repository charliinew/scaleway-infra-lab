name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_REST_API: ghcr.io/${{ github.repository_owner }}/onboarding-rest-api
  IMAGE_PROCESSOR: ghcr.io/${{ github.repository_owner }}/onboarding-image-processor

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check rest-api/

  build-rest-api:
    name: Build rest-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./rest-api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_REST_API }}:latest,${{ env.IMAGE_REST_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-image-processor:
    name: Build image-processor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./image-processor
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_PROCESSOR }}:latest,${{ env.IMAGE_PROCESSOR }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-rest-api:
    name: Scan rest-api
    runs-on: ubuntu-latest
    needs: build-rest-api
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.IMAGE_REST_API }}:${{ github.sha }}
          format: sarif
          output: trivy-rest-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-rest-api.sarif
          category: trivy-rest-api

  scan-image-processor:
    name: Scan image-processor
    runs-on: ubuntu-latest
    needs: build-image-processor
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.IMAGE_PROCESSOR }}:${{ github.sha }}
          format: sarif
          output: trivy-image-processor.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-processor.sarif
          category: trivy-image-processor
