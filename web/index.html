<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgflow — PNG to JPEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">img<span>flow</span></div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">checking…</span>
  </div>
</header>

<main>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/png">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p class="drop-title">Drop PNG here, or click to pick</p>
    <p class="drop-hint">PNG only — converts to JPEG via Scaleway</p>
  </div>

  <div class="preview-card" id="previewCard">
    <img class="preview-thumb" id="previewThumb" src="" alt="">
    <div class="preview-info">
      <div class="preview-name" id="previewName"></div>
      <div class="preview-size" id="previewSize"></div>
    </div>
    <button class="btn-clear" id="btnClear" title="Remove file">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6"  y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <button class="btn-convert" id="btnConvert">Convert to JPEG</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-header">
      <span id="progressLabel">Uploading…</span>
      <span id="progressPct"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <img class="result-img" id="resultImg" src="" alt="Converted JPEG">
    <div class="result-footer">
      <span class="result-url" id="resultUrl"></span>
      <button class="btn-copy" id="btnCopy">Copy URL</button>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
